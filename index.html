<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research Hub</title>
<style>
:root{--accent:#ffb7c5;--accent-dark:#e8829a;--accent-light:#ffe4ec;--bg1:#fff0f5;--bg2:#f8ffe0;--hdr-g:linear-gradient(135deg,#ffb7c5,#ffc8d4 50%,#c9f291);--text:#2d3148;--text2:#6b7194;--border:#ede8f0;--r:14px;--sh:0 4px 20px rgba(0,0,0,.08)}
body.spring{--accent:#ffb7c5;--accent-dark:#e8829a;--accent-light:#ffe4ec;--bg1:#fff0f5;--bg2:#f8ffe0;--hdr-g:linear-gradient(135deg,#ffb7c5,#ffc8d4 50%,#c9f291)}
body.summer{--accent:#48cae4;--accent-dark:#0096c7;--accent-light:#caf0f8;--bg1:#f0f9ff;--bg2:#e0fff8;--hdr-g:linear-gradient(135deg,#48cae4,#00b4d8 50%,#90e0ef)}
body.autumn{--accent:#e07a2f;--accent-dark:#c45e10;--accent-light:#fde8d0;--bg1:#fff8f0;--bg2:#fff3e0;--hdr-g:linear-gradient(135deg,#e07a2f,#f4a261 50%,#ffcc80)}
body.winter{--accent:#7986cb;--accent-dark:#3f51b5;--accent-light:#e8eaf6;--bg1:#f0f2ff;--bg2:#e8eaf6;--hdr-g:linear-gradient(135deg,#7986cb,#5c6bc0 50%,#9fa8da)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:linear-gradient(160deg,var(--bg1),var(--bg2));color:var(--text);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;min-height:100vh}
button{font-family:inherit}
/* Header */
header{background:var(--hdr-g);padding:18px 28px;position:relative;overflow:hidden}
header::before{content:'';position:absolute;top:-50px;right:-30px;width:220px;height:220px;border-radius:50%;background:rgba(255,255,255,.1);pointer-events:none}
header::after{content:'';position:absolute;bottom:-60px;left:30%;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.07);pointer-events:none}
.hdr-inner{position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between}
.hdr-left .hdr-sub{font-size:10px;font-weight:700;color:rgba(255,255,255,.75);text-transform:uppercase;letter-spacing:2px;margin-bottom:3px}
.hdr-left h1{font-size:24px;font-weight:800;color:#fff;letter-spacing:-.5px}
.hdr-right{display:flex;align-items:center;gap:8px}
.hdr-date{background:rgba(255,255,255,.25);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.3);border-radius:40px;padding:6px 14px;font-size:12px;color:#fff;font-weight:600}
.season-badge{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);border-radius:40px;padding:6px 12px;font-size:16px;line-height:1}
/* Main */
.main{display:flex;gap:18px;padding:18px;max-width:1400px;margin:0 auto}
.col-left{flex:0 0 60%;min-width:0}
.col-right{flex:0 0 calc(40% - 18px);min-width:0;display:flex;flex-direction:column;gap:14px}
/* Card */
.card{background:#fff;border-radius:var(--r);box-shadow:var(--sh)}
.card-header{padding:14px 16px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.card-header h2{font-size:14px;font-weight:700}
/* Calendar */
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 8px}
.cal-nav-btn{background:none;border:1px solid var(--border);border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:16px;color:var(--text2);transition:.15s;display:flex;align-items:center;justify-content:center}
.cal-nav-btn:hover{background:var(--accent-light);border-color:var(--accent)}
.cal-nav h3{font-size:15px;font-weight:700}
.cal-legend{display:flex;gap:12px;padding:0 16px 10px;flex-wrap:wrap}
.cal-legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2);font-weight:600}
.dot{display:inline-block;border-radius:50%}
.dot-sm{width:8px;height:8px}
.dot-xs{width:6px;height:6px}
.dot-research{background:#3b82f6}
.dot-general{background:#22c55e}
.dot-conference{background:#f97316}
.cal-head{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:0 8px;margin-bottom:2px}
.cal-head span{text-align:center;font-size:10px;font-weight:700;color:var(--text2);padding:4px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;padding:0 8px 10px}
.cal-day{display:flex;flex-direction:column;align-items:center;padding:4px 2px;border-radius:8px;cursor:pointer;transition:.15s;min-height:54px}
.cal-day:hover{background:var(--accent-light)}
.cal-day.today .day-num{background:var(--accent);color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center}
.cal-day.selected{background:var(--accent-light);outline:1.5px solid var(--accent)}
.cal-day.other-month .day-num{color:#ccc}
.day-num{font-size:12px;font-weight:600;margin-bottom:3px;width:22px;height:22px;display:flex;align-items:center;justify-content:center}
.day-dots{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;max-width:32px}
/* Day panel */
.day-panel{margin:0 8px 10px;background:var(--accent-light);border-radius:10px;padding:12px;display:none}
.day-panel.open{display:block}
.day-panel-title{font-size:12px;font-weight:700;margin-bottom:8px}
.day-event{display:flex;align-items:center;gap:7px;padding:6px 8px;background:#fff;border-radius:7px;margin-bottom:4px;font-size:12px}
.day-event-title{flex:1;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.day-event-proj{font-size:10px;color:var(--text2);white-space:nowrap}
.day-event-del{background:none;border:none;cursor:pointer;color:#ccc;font-size:13px;padding:0 2px;flex-shrink:0}
.day-event-del:hover{color:#e55}
.day-add-btn{background:var(--accent);color:#fff;border:none;border-radius:7px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;width:100%;margin-top:6px;transition:.15s}
.day-add-btn:hover{background:var(--accent-dark)}
/* Memo section */
.memo-tabs{display:flex;padding:0 16px;border-bottom:1px solid var(--border)}
.memo-tab{padding:10px 12px;font-size:12px;font-weight:700;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:.15s}
.memo-tab.active{color:var(--accent-dark);border-bottom-color:var(--accent)}
.memo-pane{display:none;padding:12px 16px}
.memo-pane.active{display:block}
/* Memo form */
.memo-form input,.memo-form textarea{width:100%;border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-size:12px;margin-bottom:5px;font-family:inherit;color:var(--text);outline:none;transition:.15s;resize:none}
.memo-form input:focus,.memo-form textarea:focus{border-color:var(--accent)}
.memo-form-row{display:flex;gap:6px;align-items:center;margin-top:2px}
.color-swatches{display:flex;gap:4px}
.swatch{width:16px;height:16px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:.1s}
.swatch.active{border-color:#555;transform:scale(1.2)}
.btn-sm{background:var(--accent);color:#fff;border:none;border-radius:7px;padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer;margin-left:auto;transition:.15s;white-space:nowrap}
.btn-sm:hover{background:var(--accent-dark)}
/* Memo cards */
.memo-list{display:flex;flex-direction:column;gap:7px;max-height:180px;overflow-y:auto;margin-top:8px}
.memo-card{border-radius:8px;padding:9px 10px;font-size:12px;position:relative}
.memo-card-title{font-weight:700;margin-bottom:3px;padding-right:44px;font-size:12px}
.memo-card-body{color:rgba(0,0,0,.6);line-height:1.5;white-space:pre-wrap;font-size:11px;max-height:56px;overflow:hidden}
.memo-card-btns{position:absolute;top:7px;right:7px;display:flex;gap:3px}
.icon-btn{background:rgba(0,0,0,.1);border:none;border-radius:5px;width:22px;height:22px;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;transition:.1s}
.icon-btn:hover{background:rgba(0,0,0,.2)}
/* Todo */
.todo-input-row{display:flex;gap:6px;margin-bottom:8px}
.todo-input-row input{flex:1;border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-size:12px;font-family:inherit;outline:none;color:var(--text);transition:.15s}
.todo-input-row input:focus{border-color:var(--accent)}
.todo-list{display:flex;flex-direction:column;gap:5px;max-height:190px;overflow-y:auto}
.todo-item{display:flex;align-items:center;gap:7px;padding:6px 9px;background:var(--bg2);border-radius:8px;font-size:12px}
.todo-item input[type=checkbox]{accent-color:var(--accent);width:13px;height:13px;flex-shrink:0;cursor:pointer}
.todo-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.todo-item.done .todo-label{text-decoration:line-through;color:var(--text2)}
.todo-event-btn{font-size:9px;background:var(--accent-light);color:var(--accent-dark);border:none;border-radius:4px;padding:2px 5px;cursor:pointer;font-weight:700;flex-shrink:0}
.todo-del{background:none;border:none;cursor:pointer;color:#ccc;font-size:13px;flex-shrink:0}
.todo-del:hover{color:#e55}
/* Project cards */
.proj-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;padding:12px 14px}
.proj-card{border-radius:10px;padding:12px;cursor:pointer;transition:.2s;border:1px solid var(--border);border-top:3px solid #ccc;background:#fff;position:relative;min-height:90px}
.proj-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.12)}
.proj-card-ctrl{position:absolute;top:7px;right:7px;display:flex;gap:3px;opacity:0;transition:.1s}
.proj-card:hover .proj-card-ctrl{opacity:1}
.proj-ctrl-btn{background:rgba(0,0,0,.07);border:none;border-radius:4px;width:22px;height:22px;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center}
.proj-ctrl-btn:hover{background:rgba(0,0,0,.18)}
.proj-name{font-size:12px;font-weight:800;margin-bottom:3px;padding-right:50px;line-height:1.3}
.proj-desc{font-size:10px;color:var(--text2);margin-bottom:6px;line-height:1.4;min-height:24px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.proj-tags{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:6px}
.proj-tag{font-size:9px;background:var(--accent-light);color:var(--accent-dark);padding:1px 5px;border-radius:20px;font-weight:600}
.proj-bar-bg{background:var(--border);border-radius:4px;height:3px;margin-bottom:3px}
.proj-bar-fill{height:100%;border-radius:4px;transition:.3s}
.proj-meta{display:flex;justify-content:space-between;font-size:9px;color:var(--text2)}
.proj-card-new{border:2px dashed var(--border)!important;border-top:2px dashed var(--border)!important;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text2);gap:5px;font-weight:700;font-size:11px;background:#fafafa!important}
.proj-card-new:hover{border-color:var(--accent)!important;color:var(--accent-dark);background:var(--accent-light)!important}
.proj-new-icon{font-size:24px;line-height:1}
/* Modals */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:none;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:16px;padding:22px;width:380px;max-width:94vw;max-height:88vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:800;margin-bottom:14px}
.modal label{display:block;font-size:11px;font-weight:700;color:var(--text2);margin-bottom:3px;margin-top:8px}
.modal label:first-of-type{margin-top:0}
.modal input,.modal textarea,.modal select{width:100%;border:1px solid var(--border);border-radius:8px;padding:8px 11px;font-size:12px;font-family:inherit;outline:none;color:var(--text);transition:.15s}
.modal input:focus,.modal textarea:focus,.modal select:focus{border-color:var(--accent)}
.modal textarea{resize:vertical;min-height:60px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.btn-cancel{background:none;border:1px solid var(--border);border-radius:8px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;color:var(--text2)}
.btn-ok{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;transition:.15s}
.btn-ok:hover{background:var(--accent-dark)}
.type-radios{display:flex;gap:6px;margin-top:4px}
.type-radio{flex:1;text-align:center;padding:7px 4px;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;font-size:11px;font-weight:700;transition:.15s}
.type-radio.active{border-color:var(--accent);background:var(--accent-light);color:var(--accent-dark)}
.empty-hint{font-size:11px;color:var(--text2);text-align:center;padding:14px 0}
@media(max-width:860px){.main{flex-direction:column}.col-left,.col-right{flex:none;width:100%}.proj-grid{grid-template-columns:1fr 1fr}}
@media(max-width:480px){.proj-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <div class="hdr-inner">
    <div class="hdr-left">
      <div class="hdr-sub">Research Hub</div>
      <h1>Research Hub</h1>
    </div>
    <div class="hdr-right">
      <div class="hdr-date" id="hdrDate"></div>
      <div class="season-badge" id="seasonBadge"></div>
    </div>
  </div>
</header>

<div class="main">
  <!-- LEFT: Calendar -->
  <div class="col-left">
    <div class="card">
      <div class="cal-nav">
        <button class="cal-nav-btn" id="calPrev">‹</button>
        <h3 id="calTitle"></h3>
        <button class="cal-nav-btn" id="calNext">›</button>
      </div>
      <div class="cal-legend">
        <div class="cal-legend-item"><span class="dot dot-sm dot-research"></span>연구 일정</div>
        <div class="cal-legend-item"><span class="dot dot-sm dot-general"></span>일반 일정</div>
        <div class="cal-legend-item"><span class="dot dot-sm dot-conference"></span>학회 일정</div>
      </div>
      <div class="cal-head" id="calHead"></div>
      <div class="cal-grid" id="calGrid"></div>
      <div class="day-panel" id="dayPanel"></div>
    </div>
  </div>

  <!-- RIGHT: Memo + Projects -->
  <div class="col-right">
    <div class="card">
      <div class="memo-tabs">
        <div class="memo-tab active" data-pane="memo">📌 메모</div>
        <div class="memo-tab" data-pane="todo">📋 임시일정</div>
      </div>
      <div class="memo-pane active" id="pane-memo">
        <div class="memo-form">
          <input id="memoTitle" placeholder="메모 제목" />
          <textarea id="memoBody" rows="2" placeholder="내용을 입력하세요..."></textarea>
          <div class="memo-form-row">
            <div class="color-swatches" id="memoSwatches"></div>
            <button class="btn-sm" onclick="addMemo()">저장</button>
          </div>
        </div>
        <div class="memo-list" id="memoList"></div>
      </div>
      <div class="memo-pane" id="pane-todo">
        <div class="todo-input-row">
          <input id="todoInput" placeholder="할 일을 입력하세요..." onkeydown="if(event.key==='Enter')addTodo()"/>
          <button class="btn-sm" onclick="addTodo()">추가</button>
        </div>
        <div class="todo-list" id="todoList"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <h2>📁 프로젝트</h2>
      </div>
      <div class="proj-grid" id="projGrid"></div>
    </div>
  </div>
</div>

<!-- Modal: Event -->
<div class="modal-bg" id="evtModal">
  <div class="modal">
    <h3>📅 일정 추가</h3>
    <label>일정 유형</label>
    <div class="type-radios" id="evtTypeRadios">
      <div class="type-radio active" data-type="research">🔵 연구</div>
      <div class="type-radio" data-type="general">🟢 일반</div>
      <div class="type-radio" data-type="conference">🟠 학회</div>
    </div>
    <label>제목</label>
    <input id="evtTitle" placeholder="일정 제목" />
    <label>날짜</label>
    <input type="date" id="evtDate" />
    <label>연결 프로젝트 (선택)</label>
    <select id="evtProject"><option value="">- 없음 -</option></select>
    <label>설명 (선택)</label>
    <textarea id="evtDesc" rows="2" placeholder="설명..."></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('evtModal')">취소</button>
      <button class="btn-ok" onclick="saveEvent()">저장</button>
    </div>
  </div>
</div>

<!-- Modal: New/Edit Project -->
<div class="modal-bg" id="projModal">
  <div class="modal">
    <h3 id="projModalTitle">📁 새 프로젝트</h3>
    <label>프로젝트명 *</label>
    <input id="pjName" placeholder="프로젝트 이름" />
    <label>설명</label>
    <textarea id="pjDesc" rows="2" placeholder="간단한 설명..."></textarea>
    <label>태그 (쉼표로 구분)</label>
    <input id="pjTags" placeholder="딥러닝, 실험, 논문" />
    <label>arXiv 검색 키워드 (쉼표로 구분)</label>
    <input id="pjKeywords" placeholder="deep learning, transformer" />
    <label>프로젝트 색상</label>
    <div class="color-swatches" id="projSwatches" style="margin-top:6px"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('projModal')">취소</button>
      <button class="btn-ok" onclick="saveProject()">저장</button>
    </div>
  </div>
</div>

<!-- Modal: Convert to Event -->
<div class="modal-bg" id="toEvtModal">
  <div class="modal">
    <h3>📅 일정으로 전환</h3>
    <label>날짜 *</label>
    <input type="date" id="toEvtDate" />
    <label>일정 유형</label>
    <div class="type-radios" id="toEvtTypeRadios">
      <div class="type-radio active" data-type="research">🔵 연구</div>
      <div class="type-radio" data-type="general">🟢 일반</div>
      <div class="type-radio" data-type="conference">🟠 학회</div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('toEvtModal')">취소</button>
      <button class="btn-ok" onclick="confirmToEvent()">전환</button>
    </div>
  </div>
</div>

<script>
// ── Utils
const LS={
  get:(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}},
  set:(k,v)=>localStorage.setItem(k,JSON.stringify(v))
};
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function closeModal(id){document.getElementById(id).classList.remove('open')}
document.querySelectorAll('.modal-bg').forEach(bg=>bg.addEventListener('click',e=>{if(e.target===bg)bg.classList.remove('open')}));

// ── Season
function getSeason(m){if(m>=3&&m<=5)return'spring';if(m>=6&&m<=8)return'summer';if(m>=9&&m<=11)return'autumn';return'winter'}
const SEASON={spring:{icon:'🌸',label:'봄'},summer:{icon:'☀️',label:'여름'},autumn:{icon:'🍂',label:'가을'},winter:{icon:'❄️',label:'겨울'}};
const NOW=new Date();
const season=getSeason(NOW.getMonth()+1);
document.body.classList.add(season);
document.getElementById('hdrDate').textContent=NOW.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
const si=SEASON[season];
document.getElementById('seasonBadge').textContent=si.icon+' '+si.label;

// ── Calendar
let calY=NOW.getFullYear(),calM=NOW.getMonth();
let selDate=null;
const DAYS=['일','월','화','수','목','금','토'];
const todayStr=NOW.toISOString().slice(0,10);

function getEvents(){return LS.get('rh_events',[])}
function getProjects(){return LS.get('rh_projects',[])}

function renderCalHead(){
  document.getElementById('calHead').innerHTML=DAYS.map(d=>`<span>${d}</span>`).join('');
}

function renderCal(){
  document.getElementById('calTitle').textContent=`${calY}년 ${calM+1}월`;
  const events=getEvents();
  const evtByDate={};
  events.forEach(e=>{if(!evtByDate[e.date])evtByDate[e.date]=[];evtByDate[e.date].push(e)});

  const firstDay=new Date(calY,calM,1).getDay();
  const lastDate=new Date(calY,calM+1,0).getDate();
  const prevLast=new Date(calY,calM,0).getDate();
  const cells=[];
  for(let i=firstDay-1;i>=0;i--)cells.push({d:prevLast-i,other:true,m:calM-1,y:calY});
  for(let i=1;i<=lastDate;i++)cells.push({d:i,other:false,m:calM,y:calY});
  const rem=42-cells.length;
  for(let i=1;i<=rem;i++)cells.push({d:i,other:true,m:calM+1,y:calY});

  const grid=document.getElementById('calGrid');
  grid.innerHTML='';
  cells.forEach(({d,m,y,other})=>{
    const rm=((m%12)+12)%12;
    const ry=m<0?y-1:m>11?y+1:y;
    const ds=`${ry}-${String(rm+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayEvts=evtByDate[ds]||[];
    const isToday=ds===todayStr;
    const isSel=ds===selDate;
    const el=document.createElement('div');
    el.className='cal-day'+(other?' other-month':'')+(isToday?' today':'')+(isSel?' selected':'');
    el.innerHTML=`<div class="day-num">${d}</div><div class="day-dots">${
      dayEvts.slice(0,5).map(e=>`<span class="dot dot-xs dot-${e.type}"></span>`).join('')
    }</div>`;
    el.onclick=()=>selectDate(ds);
    grid.appendChild(el);
  });
}

function selectDate(ds){
  selDate=ds;
  renderCal();
  renderDayPanel(ds);
}

function renderDayPanel(ds){
  const panel=document.getElementById('dayPanel');
  const events=getEvents().filter(e=>e.date===ds);
  const projects=getProjects();
  const d=new Date(ds+'T00:00:00');
  const label=d.toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'});
  panel.innerHTML=`<div class="day-panel-title">📅 ${label}</div>`+
    (events.length?events.map(e=>{
      const proj=projects.find(p=>p.id===e.projectId);
      return`<div class="day-event">
        <span class="dot dot-xs dot-${e.type}"></span>
        <span class="day-event-title">${escHtml(e.title)}</span>
        ${proj?`<span class="day-event-proj">${escHtml(proj.name)}</span>`:''}
        <button class="day-event-del" onclick="deleteEvent('${e.id}','${ds}')">✕</button>
      </div>`;
    }).join(''):`<div class="empty-hint">일정이 없습니다</div>`)+
    `<button class="day-add-btn" onclick="openEvtModal('${ds}')">+ 일정 추가</button>`;
  panel.classList.add('open');
}

function deleteEvent(id,ds){
  LS.set('rh_events',getEvents().filter(e=>e.id!==id));
  renderCal();renderDayPanel(ds);
}

document.getElementById('calPrev').onclick=()=>{calM--;if(calM<0){calM=11;calY--;}renderCal()};
document.getElementById('calNext').onclick=()=>{calM++;if(calM>11){calM=0;calY++;}renderCal()};

// ── Event modal
let evtType='research';
function updateTypeRadios(containerId,selected){
  document.querySelectorAll(`#${containerId} .type-radio`).forEach(el=>{
    el.classList.toggle('active',el.dataset.type===selected);
  });
}
document.querySelectorAll('#evtTypeRadios .type-radio').forEach(el=>{
  el.onclick=()=>{evtType=el.dataset.type;updateTypeRadios('evtTypeRadios',evtType)};
});

function openEvtModal(ds=''){
  evtType='research';updateTypeRadios('evtTypeRadios','research');
  document.getElementById('evtTitle').value='';
  document.getElementById('evtDate').value=ds;
  document.getElementById('evtDesc').value='';
  const sel=document.getElementById('evtProject');
  sel.innerHTML='<option value="">- 없음 -</option>'+
    getProjects().map(p=>`<option value="${p.id}">${escHtml(p.name)}</option>`).join('');
  document.getElementById('evtModal').classList.add('open');
}

function saveEvent(){
  const title=document.getElementById('evtTitle').value.trim();
  const date=document.getElementById('evtDate').value;
  if(!title||!date){alert('제목과 날짜를 입력해주세요');return}
  const events=getEvents();
  events.push({id:uid(),title,date,type:evtType,
    projectId:document.getElementById('evtProject').value,
    desc:document.getElementById('evtDesc').value});
  LS.set('rh_events',events);
  closeModal('evtModal');renderCal();
  if(selDate)renderDayPanel(selDate);
}

// ── Memos
const MEMO_COLORS=['#fff9c4','#c8e6c9','#bbdefb','#f8bbd0','#ffe0b2','#e1bee7'];
let memoColor=MEMO_COLORS[0];

function renderMemoSwatches(){
  document.getElementById('memoSwatches').innerHTML=MEMO_COLORS.map(c=>
    `<div class="swatch${c===memoColor?' active':''}" style="background:${c}" onclick="setMemoColor('${c}')"></div>`
  ).join('');
}
function setMemoColor(c){memoColor=c;renderMemoSwatches()}

function addMemo(){
  const title=document.getElementById('memoTitle').value.trim();
  const body=document.getElementById('memoBody').value.trim();
  if(!title&&!body)return;
  const memos=LS.get('rh_memos',[]);
  memos.unshift({id:uid(),title,body,color:memoColor,createdAt:new Date().toISOString()});
  LS.set('rh_memos',memos);
  document.getElementById('memoTitle').value='';
  document.getElementById('memoBody').value='';
  renderMemos();
}

function deleteMemo(id){
  LS.set('rh_memos',LS.get('rh_memos',[]).filter(m=>m.id!==id));
  renderMemos();
}

function renderMemos(){
  const memos=LS.get('rh_memos',[]);
  const list=document.getElementById('memoList');
  if(!memos.length){list.innerHTML='<div class="empty-hint">메모가 없습니다</div>';return}
  list.innerHTML=memos.map(m=>`<div class="memo-card" style="background:${m.color}">
    ${m.title?`<div class="memo-card-title">${escHtml(m.title)}</div>`:''}
    <div class="memo-card-body">${escHtml(m.body)}</div>
    <div class="memo-card-btns">
      <button class="icon-btn" title="일정으로 전환" onclick="openToEvtModal('memo','${m.id}')">📅</button>
      <button class="icon-btn" title="삭제" onclick="deleteMemo('${m.id}')">✕</button>
    </div>
  </div>`).join('');
}

// ── Todos
function addTodo(){
  const inp=document.getElementById('todoInput');
  const text=inp.value.trim();if(!text)return;
  const todos=LS.get('rh_todos',[]);
  todos.unshift({id:uid(),text,done:false,createdAt:new Date().toISOString()});
  LS.set('rh_todos',todos);inp.value='';renderTodos();
}
function toggleTodo(id){
  const todos=LS.get('rh_todos',[]);
  const t=todos.find(t=>t.id===id);if(t)t.done=!t.done;
  LS.set('rh_todos',todos);renderTodos();
}
function deleteTodo(id){LS.set('rh_todos',LS.get('rh_todos',[]).filter(t=>t.id!==id));renderTodos()}
function renderTodos(){
  const todos=LS.get('rh_todos',[]);
  const list=document.getElementById('todoList');
  if(!todos.length){list.innerHTML='<div class="empty-hint">할 일이 없습니다</div>';return}
  list.innerHTML=todos.map(t=>`<div class="todo-item${t.done?' done':''}">
    <input type="checkbox"${t.done?' checked':''} onchange="toggleTodo('${t.id}')">
    <span class="todo-label">${escHtml(t.text)}</span>
    <button class="todo-event-btn" onclick="openToEvtModal('todo','${t.id}')">→일정</button>
    <button class="todo-del" onclick="deleteTodo('${t.id}')">✕</button>
  </div>`).join('');
}

// ── Convert to Event modal
let toEvtType='general';
let _toEvtSource=null; // {type:'memo'|'todo', id}
document.querySelectorAll('#toEvtTypeRadios .type-radio').forEach(el=>{
  el.onclick=()=>{toEvtType=el.dataset.type;updateTypeRadios('toEvtTypeRadios',toEvtType)};
});
function openToEvtModal(type,id){
  _toEvtSource={type,id};
  toEvtType='general';updateTypeRadios('toEvtTypeRadios','general');
  document.getElementById('toEvtDate').value='';
  document.getElementById('toEvtModal').classList.add('open');
}
function confirmToEvent(){
  const date=document.getElementById('toEvtDate').value;
  if(!date){alert('날짜를 선택해주세요');return}
  let title='',desc='';
  if(_toEvtSource.type==='memo'){
    const m=LS.get('rh_memos',[]).find(x=>x.id===_toEvtSource.id);
    if(!m)return;title=m.title||m.body.slice(0,40);desc=m.body;
  }else{
    const t=LS.get('rh_todos',[]).find(x=>x.id===_toEvtSource.id);
    if(!t)return;title=t.text;
  }
  const events=getEvents();
  events.push({id:uid(),title,date,type:toEvtType,projectId:'',desc});
  LS.set('rh_events',events);
  closeModal('toEvtModal');renderCal();
  if(selDate)renderDayPanel(selDate);
  alert('일정으로 등록했습니다!');
}

// ── Memo tabs
document.querySelectorAll('.memo-tab').forEach(tab=>{
  tab.onclick=()=>{
    document.querySelectorAll('.memo-tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.memo-pane').forEach(p=>p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('pane-'+tab.dataset.pane).classList.add('active');
  };
});

// ── Projects
const PROJ_COLORS=['#ffb7c5','#48cae4','#e07a2f','#7986cb','#22c55e','#a78bfa','#ffd166','#ef233c'];
let projColor=PROJ_COLORS[0];
let editProjId=null;

function renderProjSwatches(){
  document.getElementById('projSwatches').innerHTML=PROJ_COLORS.map(c=>
    `<div class="swatch${c===projColor?' active':''}" style="background:${c}" onclick="setProjColor('${c}')"></div>`
  ).join('');
}
function setProjColor(c){projColor=c;renderProjSwatches()}

function calcProgress(id){
  const ms=LS.get(`project_${id}_milestones`,[]);
  if(!ms.length)return 0;
  return Math.round(ms.filter(m=>m.done).length/ms.length*100);
}

function renderProjects(){
  const projects=getProjects();
  const grid=document.getElementById('projGrid');
  grid.innerHTML=projects.map(p=>{
    const prog=calcProgress(p.id);
    const upd=new Date(p.updatedAt).toLocaleDateString('ko-KR',{month:'short',day:'numeric'});
    return`<div class="proj-card" style="border-top-color:${p.color||'var(--accent)'}" onclick="goProject('${p.id}')">
      <div class="proj-card-ctrl">
        <button class="proj-ctrl-btn" onclick="editProject(event,'${p.id}')">✏️</button>
        <button class="proj-ctrl-btn" onclick="deleteProject(event,'${p.id}')">🗑️</button>
      </div>
      <div class="proj-name">${escHtml(p.name)}</div>
      <div class="proj-desc">${escHtml(p.desc||'')}</div>
      <div class="proj-tags">${(p.tags||[]).map(t=>`<span class="proj-tag">${escHtml(t)}</span>`).join('')}</div>
      <div class="proj-bar-bg"><div class="proj-bar-fill" style="width:${prog}%;background:${p.color||'var(--accent)'}"></div></div>
      <div class="proj-meta"><span>${prog}% 완료</span><span>${upd}</span></div>
    </div>`;
  }).join('')+`<div class="proj-card proj-card-new" onclick="openProjModal()">
    <div class="proj-new-icon">+</div><div>새 프로젝트</div>
  </div>`;
}

function openProjModal(){
  editProjId=null;
  document.getElementById('projModalTitle').textContent='📁 새 프로젝트';
  document.getElementById('pjName').value='';
  document.getElementById('pjDesc').value='';
  document.getElementById('pjTags').value='';
  document.getElementById('pjKeywords').value='';
  projColor=PROJ_COLORS[0];renderProjSwatches();
  document.getElementById('projModal').classList.add('open');
}
function editProject(e,id){
  e.stopPropagation();
  const p=getProjects().find(p=>p.id===id);if(!p)return;
  editProjId=id;
  document.getElementById('projModalTitle').textContent='✏️ 프로젝트 수정';
  document.getElementById('pjName').value=p.name;
  document.getElementById('pjDesc').value=p.desc||'';
  document.getElementById('pjTags').value=(p.tags||[]).join(', ');
  document.getElementById('pjKeywords').value=(p.keywords||[]).join(', ');
  projColor=p.color||PROJ_COLORS[0];renderProjSwatches();
  document.getElementById('projModal').classList.add('open');
}
function deleteProject(e,id){
  e.stopPropagation();
  if(!confirm('프로젝트를 삭제하시겠습니까?'))return;
  LS.set('rh_projects',getProjects().filter(p=>p.id!==id));
  renderProjects();
}
function saveProject(){
  const name=document.getElementById('pjName').value.trim();
  if(!name){alert('프로젝트명을 입력해주세요');return}
  const projects=getProjects();
  const obj={
    name,desc:document.getElementById('pjDesc').value.trim(),
    tags:document.getElementById('pjTags').value.split(',').map(t=>t.trim()).filter(Boolean),
    keywords:document.getElementById('pjKeywords').value.split(',').map(k=>k.trim()).filter(Boolean),
    color:projColor,updatedAt:new Date().toISOString()
  };
  if(editProjId){
    const idx=projects.findIndex(p=>p.id===editProjId);
    if(idx>=0)projects[idx]={...projects[idx],...obj};
  }else{
    projects.push({id:uid(),...obj,progress:0});
  }
  LS.set('rh_projects',projects);
  closeModal('projModal');renderProjects();
}
function goProject(id){window.location.href='project.html?id='+id}

function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// ── Init
renderCalHead();renderCal();
renderMemoSwatches();renderMemos();renderTodos();
renderProjects();renderProjSwatches();
</script>
</body>
